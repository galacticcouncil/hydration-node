[package]
name = "pallet-ice-runtime-api"
version = "1.0.0"
description = "ICE node solver runtime api"
authors = ["GalacticCouncil"]
edition = "2021"
license = "Apache 2.0"
repository = "https://github.com/galacticcouncil/hydration-node"

[dependencies]
codec = { workspace = true }
scale-info = { workspace = true }
sp-api = { workspace = true }
sp-std = { workspace = true }
sp-runtime = { workspace = true }
ice-support = { workspace = true }

[features]
default = ["std"]
std = [
    "codec/std",
    "scale-info/std",
    "sp-api/std",
    "sp-std/std",
    "sp-runtime/std",
    "ice-support/std",
]
