[package]
name = "pallet-gigahdx-rewards"
version = "0.1.0"
description = "Conviction-voting reward distribution for gigahdx stakers."
authors = ["GalacticCouncil"]
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/galacticcouncil/hydration-node"

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { workspace = true }
scale-info = { workspace = true }
log = { workspace = true }

# Substrate
frame-support = { workspace = true }
frame-system = { workspace = true }
sp-runtime = { workspace = true }
sp-std = { workspace = true }
sp-core = { workspace = true }
sp-io = { workspace = true }

# Conviction voting / referenda
pallet-conviction-voting = { workspace = true }

# Local
pallet-gigahdx = { workspace = true }
primitives = { workspace = true }

frame-benchmarking = { workspace = true, optional = true }

[dev-dependencies]
sp-io = { workspace = true, features = ["std"] }
sp-core = { workspace = true, features = ["std"] }
sp-runtime = { workspace = true, features = ["std"] }
pallet-balances = { workspace = true, features = ["std"] }
orml-traits = { workspace = true, features = ["std"] }
orml-tokens = { workspace = true, features = ["std"] }
hydra-dx-math = { workspace = true, features = ["std"] }
hydradx-traits = { workspace = true, features = ["std"] }

[features]
default = ["std"]
std = [
    "codec/std",
    "scale-info/std",
    "frame-support/std",
    "frame-system/std",
    "sp-runtime/std",
    "sp-std/std",
    "sp-core/std",
    "sp-io/std",
    "frame-benchmarking?/std",
    "pallet-conviction-voting/std",
    "pallet-gigahdx/std",
    "primitives/std",
]
runtime-benchmarks = [
    "frame-benchmarking/runtime-benchmarks",
    "frame-support/runtime-benchmarks",
    "frame-system/runtime-benchmarks",
    "pallet-conviction-voting/runtime-benchmarks",
    "pallet-gigahdx/runtime-benchmarks",
]
try-runtime = [
    "frame-support/try-runtime",
    "pallet-conviction-voting/try-runtime",
    "pallet-gigahdx/try-runtime",
]
