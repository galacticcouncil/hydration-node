[package]
name = "pallet-evm-precompile-lock-manager"
description = "A Precompile to query GIGAHDX voting lock state."
edition = "2021"
version = "1.0.0"
authors = ["GalacticCouncil"]
repository = "https://github.com/galacticcouncil/hydration-node"

[dependencies]
log = { workspace = true }
num_enum = { workspace = true }
precompile-utils = { workspace = true }

# Substrate
frame-support = { workspace = true }
frame-system = { workspace = true }
pallet-gigahdx-voting = { workspace = true }
codec = { workspace = true, features = [ "max-encoded-len" ] }
sp-core = { workspace = true }
sp-io = { workspace = true }
sp-runtime = { workspace = true }
sp-std = { workspace = true }

# Frontier
fp-evm = { workspace = true }
pallet-evm = { workspace = true }

[dev-dependencies]

[features]
default = [ "std" ]
std = [
	"fp-evm/std",
	"frame-support/std",
	"frame-system/std",
	"pallet-evm/std",
	"pallet-gigahdx-voting/std",
	"codec/std",
	"precompile-utils/std",
	"sp-core/std",
	"sp-io/std",
	"sp-std/std",
]
