[package]
name = "pepl-worker-support"
version = "0.1.0"
description = "PEPL Liquidation Worker"
authors = ["GalacticCouncil"]
edition = "2021"
license = "Apache 2.0"
repository = "https://github.com/galacticcouncil/hydration-node"

[dependencies]
primitives = { workspace = true , default-features=true }
sp-core = { workspace = true, default-features=true }
sp-std = { workspace = true, default-features=true }
ethabi = { workspace = true, default-features=true }
sc-client-api = { workspace = true, default-features=true } 
sp-runtime = { workspace = true, default-features=true }
sp-blockchain = { workspace = true, default-features=true }
sp-api = { workspace = true, default-features=true }
hydradx-runtime = { workspace = true, default-features=true }
sp-arithmetic = { workspace = true }
evm = { workspace = true, features = ["with-codec"] }
fp-evm = { workspace = true }
primitive-types = { workspace = true }
frame-support = { workspace = true }
module-evm-utility-macro = { workspace = true }
num_enum = { workspace = true, default-features = false }
log = { workspace = true }
fp-rpc = { workspace = true }
pallet-currencies-rpc-runtime-api = { workspace = true }


#TODO: remove, it's used to test something
hex-literal = { workspace = true }
